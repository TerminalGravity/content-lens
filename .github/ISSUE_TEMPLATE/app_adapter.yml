name: New source app
description: Propose or implement a new source adapter
title: "Add app: "
labels: [app-adapter]
body:
  - type: input
    id: source
    attributes:
      label: Source
      placeholder: X, Reddit, podcast RSS, webpage
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Desired artifacts
      description: Metadata, transcript, comments, images, timestamps, etc.
    validations:
      required: true
  - type: textarea
    id: auth
    attributes:
      label: Auth/API requirements
      description: Note whether this can work without credentials.
